name: HTML Validation Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  validate-html:
    name: Validar HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar htmlhint
        run: npm install -g htmlhint

      - name: Executar HTMLHint
        run: htmlhint index.html

  check-doctype:
    name: Verificar DOCTYPE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Conferir DOCTYPE
        run: |
          grep -q "<!DOCTYPE html>" index.html

  check-title:
    name: Verificar TAG TITLE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Conferir TITLE
        run: |
          grep -q "<title>" index.html